global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: oneproduct
    env: dev

scrape_configs:
  - job_name: oneproduct-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: oneproduct-api

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
