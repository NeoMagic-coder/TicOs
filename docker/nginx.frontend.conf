# Serve the Vite-built SPA. Any request that doesn't match a file falls back
# to /index.html so React Router (or hash-based routing) keeps working on
# deep links and refreshes.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;

    # Aggressive caching for hashed asset files; HTML stays uncached so a new
    # deploy is picked up on the next page load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
