# Production orchestration. Builds both images with the production-mode
# Dockerfiles (no --reload, nginx-served SPA on port 80) and wires a host-
# level Caddy/nginx-style reverse proxy if you want a single :80 entry.
#
# Usage:
#   docker compose -f docker/compose.prod.yml --env-file env/.env.prod up -d --build
services:
  api:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    image: ${REGISTRY:-ghcr.io/yourorg/oneproduct}/api:${IMAGE_TAG:-latest}
    container_name: oneproduct-api-prod
    restart: always
    expose:
      - "8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      API_KEY: ${API_KEY:-}
      DAILY_BUDGET_MAX_USD: ${DAILY_BUDGET_MAX_USD:-0}
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: info
    env_file:
      - ../env/.env.prod
    volumes:
      - api_images:/app/apps/api/_images
      - api_data:/app/apps/api/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_API_KEY: ${API_KEY:-}
        VITE_GEMINI_MODEL: ${VITE_GEMINI_MODEL:-gemini-2.5-flash-lite}
    image: ${REGISTRY:-ghcr.io/yourorg/oneproduct}/web:${IMAGE_TAG:-latest}
    container_name: oneproduct-web-prod
    restart: always
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: oneproduct-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api_images:
    driver: local
  api_data:
    driver: local
