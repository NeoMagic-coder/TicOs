apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: oneproduct
  labels:
    app: oneproduct-api
spec:
  type: ClusterIP
  selector:
    app: oneproduct-api
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: oneproduct
  labels:
    app: oneproduct-web
spec:
  type: ClusterIP
  selector:
    app: oneproduct-web
  ports:
  - name: http
    port: 5173
    targetPort: http
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oneproduct-network-policy
  namespace: oneproduct
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: oneproduct-web
    - podSelector:
        matchLabels:
          app: oneproduct-api
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: oneproduct-api
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app: oneproduct-web
    ports:
    - protocol: TCP
      port: 5173
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oneproduct-api-hpa
  namespace: oneproduct
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oneproduct-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oneproduct-web-hpa
  namespace: oneproduct
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oneproduct-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oneproduct-api-pdb
  namespace: oneproduct
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: oneproduct-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oneproduct-web-pdb
  namespace: oneproduct
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: oneproduct-web
