apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneproduct-api
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          initialDelaySeconds: 5
          periodSeconds: 5
