apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneproduct-web
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: web
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
