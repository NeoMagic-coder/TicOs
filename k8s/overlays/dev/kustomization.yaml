apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development environment overlay
# Usage: kubectl kustomize k8s/overlays/dev

namespace: oneproduct-dev

namePrefix: dev-

commonLabels:
  environment: development
  app.kubernetes.io/name: oneproduct

replicas:
  - name: dev-oneproduct-api
    count: 1
  - name: dev-oneproduct-web
    count: 1

images:
  - name: REGISTRY/api
    newName: localhost:5000/oneproduct/api
    newTag: latest
  - name: REGISTRY/web
    newName: localhost:5000/oneproduct/web
    newTag: latest

configMapGenerator:
  - name: oneproduct-config
    behavior: merge
    literals:
      - VITE_API_BASE_URL=http://dev-api.oneproduct-dev.svc.cluster.local:8000
      - LOG_LEVEL=debug

patchesStrategicMerge:
  - deployment-api.yaml
  - deployment-web.yaml

resources:
  - ../../deployment.yaml
  - ../../service.yaml
