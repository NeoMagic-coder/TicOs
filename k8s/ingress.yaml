apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oneproduct-ingress
  namespace: oneproduct
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - oneproduct.example.com
    - api.oneproduct.example.com
    secretName: oneproduct-tls
  rules:
  - host: oneproduct.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 5173
  - host: api.oneproduct.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 8000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oneproduct-cert
  namespace: oneproduct
spec:
  secretName: oneproduct-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - oneproduct.example.com
  - api.oneproduct.example.com
