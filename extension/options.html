<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title>OneProduct Agent OS — Ayarlar</title>
    <style>
      body {
        font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        background: #0b1220;
        color: #e6edf7;
        max-width: 520px;
        margin: 40px auto;
        padding: 0 20px;
        font-size: 14px;
      }
      h1 {
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h1 span {
        color: #0ea5e9;
      }
      label {
        display: block;
        margin: 18px 0 6px;
        font-weight: 600;
      }
      .hint {
        color: #8aa0c0;
        font-size: 12px;
        margin-top: 4px;
      }
      input {
        width: 100%;
        padding: 9px 10px;
        background: #111a2e;
        border: 1px solid #1e2d4a;
        border-radius: 8px;
        color: #e6edf7;
        font-size: 14px;
      }
      input:focus {
        outline: none;
        border-color: #0ea5e9;
      }
      button {
        margin-top: 22px;
        background: linear-gradient(120deg, #0ea5e9, #6366f1);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved {
        color: #22c55e;
        margin-left: 12px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .saved.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1><span>◆</span> OneProduct Agent OS — Ayarlar</h1>

    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="url" placeholder="http://127.0.0.1:8000" />
    <div class="hint">
      FastAPI backend adresi. Yerel geliştirmede <code>http://127.0.0.1:8000</code>.
      Farklı bir host kullanıyorsanız <code>manifest.json</code> içindeki
      <code>host_permissions</code> listesine de eklemeniz gerekir.
    </div>

    <label for="apiKey">API Anahtarı (opsiyonel)</label>
    <input id="apiKey" type="password" placeholder="X-API-Key (boş bırakılabilir)" />
    <div class="hint">
      Backend'de <code>API_KEY</code> tanımlıysa girin. Yerel dev için boş bırakın.
    </div>

    <div>
      <button id="save">Kaydet</button>
      <span class="saved" id="saved">✓ kaydedildi</span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
